<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <div id="nav-placeholder"></div>

    <section class="container">
        <h1>Hi, I'm <span class="accent-text">Prayash Poudel</span></h1>

            BCA Student & Backend Developer based in <strong>Electronic City, Bengaluru</strong>.

        <button id="surprise-btn">.</button>

    <script src="nav.js"></script>
    <script>
        document.getElementById('surprise-btn').addEventListener('click', () => {
            const code = prompt("Enter the secret access code:");
            if (code === "772277") {
                document.body.style.transition = "background 0.5s";
                document.body.style.background = "#ff1493";
                
                const msg = document.createElement('div');
                msg.style = "position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); font-size:4rem; font-weight:bold; color:white; z-index:10000; text-align:center; text-shadow: 2px 2px 10px rgba(0,0,0,0.5);";
                msg.innerHTML = "💖 I love you Simi 💖";
                document.body.appendChild(msg);

                // Simple "vibrant animation" effect
                setInterval(() => {
                    msg.style.transform = `translate(-50%, -50%) scale(${1 + Math.random() * 0.1})`;
                }, 100);
            }
        });
    </script>
