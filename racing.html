<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing | Arcade</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
        }
        
        canvas {
            background-color: #334155; /* Asphalt Road Color */
            border: 4px solid #0f172a;
            border-left: 8px solid #cbd5e1; /* Left Sidewalk */
            border-right: 8px solid #cbd5e1; /* Right Sidewalk */
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        .scoreboard {
            display: flex;
            gap: 3rem;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box { 
            background: var(--card-bg); 
            padding: 0.75rem 2rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .controls-hint { 
            margin-top: 1.5rem; 
            color: var(--text-secondary); 
            font-size: 0.95rem; 
            text-align: center;
        }

        /* Overlay for Game Over / Start */
        .game-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            z-index: 10;
            width: 80%;
        }
        
        .game-area {
            position: relative;
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container" style="padding-top: 2rem; padding-bottom: 0;">
        <a href="arcade.html" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);">← Back to Arcade</a>
    </div>

    <div class="game-wrapper container">
        
        <div class="scoreboard">
            <div class="score-box">Score: <span id="score" class="accent-text">0</span></div>
            <div class="score-box">High Score: <span id="high-score" class="accent-text">0</span></div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="300" height="500"></canvas>
            
            <div id="game-over" class="game-overlay" style="display: none;">
                <h2 style="color: #ef4444; margin-bottom: 0.5rem;">CRASH!</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Watch out for traffic.</p>
                <button id="restart-btn" class="btn">Race Again</button>
            </div>

            <div id="start-screen" class="game-overlay">
                <h2 class="accent-text" style="margin-bottom: 0.5rem;">Retro Racing</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Dodge the cars, trucks, and bikes!</p>
                <button id="start-btn" class="btn">Start Engine</button>
            </div>
        </div>
        
        <p class="controls-hint">
            <strong>Controls:</strong> Left and Right Arrow Keys to steer.<br>
            <em>Speed increases the further you go!</em>
        </p>
    </div>

    <script src="nav.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("high-score");
        
        const gameOverScreen = document.getElementById("game-over");
        const startScreen = document.getElementById("start-screen");
        const restartBtn = document.getElementById("restart-btn");
        const startBtn = document.getElementById("start-btn");

        // Load High Score
        let highScore = localStorage.getItem("racingHighScore") || 0;
        highScoreEl.innerText = highScore;

        // Game State
        let frames = 0;
        let score = 0;
        let gameRunning = false;
        let animationId;
        let baseSpeed = 4; // Starting road speed

        // Road Animation
        let lineOffset = 0;

        // Input State
        const keys = { ArrowLeft: false, ArrowRight: false };

        // Player (Racing Car)
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 80,
            width: 30, // Hitbox
            height: 50,
            speed: 6,
            draw: function() {
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("🏎️", this.x, this.y);
            },
            update: function() {
                if (keys.ArrowLeft && this.x > this.width / 2) {
                    this.x -= this.speed;
                }
                if (keys.ArrowRight && this.x < canvas.width - this.width / 2) {
                    this.x += this.speed;
                }
            }
        };

        // Traffic (Enemies)
        const traffic = {
            array: [],
            vehicles: ["🚗", "🚚", "🏍️"], // Car, Truck, Motorbike
            draw: function() {
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                for (let i = 0; i < this.array.length; i++) {
                    let v = this.array[i];
                    ctx.fillText(v.type, v.x, v.y);
                }
            },
            update: function() {
                // Determine spawn rate based on speed (faster speed = spawn faster)
                let spawnRate = Math.max(30, 90 - (score * 2));

                if (frames % spawnRate === 0) {
                    // Divide road into 3 lanes
                    let laneWidth = canvas.width / 3;
                    let laneIndex = Math.floor(Math.random() * 3);
                    let xPos = (laneIndex * laneWidth) + (laneWidth / 2);
                    
                    // Slightly randomize speed so some vehicles are faster than others
                    let vSpeed = baseSpeed + (Math.random() * 2 - 1);

                    this.array.push({
                        x: xPos,
                        y: -50,
                        type: this.vehicles[Math.floor(Math.random() * this.vehicles.length)],
                        speed: vSpeed,
                        passed: false
                    });
                }

                for (let i = 0; i < this.array.length; i++) {
                    let v = this.array[i];
                    v.y += v.speed; // Move traffic down

                    // AABB Collision Detection (adjusted slightly for emoji shapes)
                    let pLeft = player.x - 15;
                    let pRight = player.x + 15;
                    let pTop = player.y - 20;
                    let pBottom = player.y + 20;

                    let vLeft = v.x - 15;
                    let vRight = v.x + 15;
                    let vTop = v.y - 20;
                    let vBottom = v.y + 20;

                    if (pLeft < vRight && pRight > vLeft && pTop < vBottom && pBottom > vTop) {
                        triggerGameOver();
                    }

                    // Score Update (If you pass a vehicle)
                    if (v.y > player.y + 30 && !v.passed) {
                        score++;
                        scoreEl.innerText = score;
                        v.passed = true;
                        
                        // Increase global speed slightly for every 5 vehicles passed
                        if (score % 5 === 0) {
                            baseSpeed += 0.5;
                        }
                    }

                    // Remove off-screen vehicles
                    if (v.y > canvas.height + 50) {
                        this.array.shift();
                        i--;
                    }
                }
            },
            reset: function() {
                this.array = [];
            }
        };

        function drawRoad() {
            // Background
            ctx.fillStyle = "#334155";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Animated Dashed Center Lines
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 6;
            ctx.setLineDash([30, 30]); // Length of dash, length of gap
            
            // Move the line offset to create the illusion of speed
            lineOffset -= baseSpeed;
            if (lineOffset <= -60) lineOffset = 0;
            
            ctx.lineDashOffset = lineOffset;

            // Draw two lane dividers
            ctx.beginPath();
            ctx.moveTo(canvas.width / 3, 0);
            ctx.lineTo(canvas.width / 3, canvas.height);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo((canvas.width / 3) * 2, 0);
            ctx.lineTo((canvas.width / 3) * 2, canvas.height);
            ctx.stroke();
            
            // Reset dash for other drawings
            ctx.setLineDash([]);
        }

        // Main Game Loop
        function loop() {
            if (!gameRunning) return;

            drawRoad();

            player.update();
            player.draw();

            traffic.update();
            traffic.draw();

            frames++;
            animationId = requestAnimationFrame(loop);
        }

        // Setup & Triggers
        function initGame() {
            player.x = canvas.width / 2;
            traffic.reset();
            score = 0;
            frames = 0;
            baseSpeed = 4;
            scoreEl.innerText = score;
            
            gameOverScreen.style.display = "none";
            startScreen.style.display = "none";
            
            gameRunning = true;
            loop();
        }

        function triggerGameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("racingHighScore", highScore);
                highScoreEl.innerText = highScore;
            }
            
            gameOverScreen.style.display = "flex";
        }

        // Input Listeners
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") { keys.ArrowLeft = true; e.preventDefault(); }
            if (e.key === "ArrowRight") { keys.ArrowRight = true; e.preventDefault(); }
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft") keys.ArrowLeft = false;
            if (e.key === "ArrowRight") keys.ArrowRight = false;
        });
        
        startBtn.addEventListener("click", initGame);
        restartBtn.addEventListener("click", initGame);

        // Initial Draw (just the background before start)
        drawRoad();
        player.draw();

    </script>
</body>
</html>
