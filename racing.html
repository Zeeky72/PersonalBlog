<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Racing | Arcade</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
            user-select: none; 
        }
        
        canvas {
            background-color: #334155; 
            border: 4px solid #0f172a;
            border-left: 8px solid #cbd5e1; 
            border-right: 8px solid #cbd5e1; 
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 100%;
            transition: filter 0.3s;
        }

        @keyframes crashShake {
            0% { transform: translate(0, 0) rotate(0deg); filter: contrast(1) brightness(1); }
            20% { transform: translate(-8px, 5px) rotate(-1deg); filter: contrast(1.5) brightness(1.2) drop-shadow(0 0 10px red); }
            40% { transform: translate(8px, -5px) rotate(1deg); }
            60% { transform: translate(-8px, -5px) rotate(-1deg); }
            80% { transform: translate(8px, 5px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); filter: contrast(1) brightness(1); }
        }

        .canvas-shake {
            animation: crashShake 0.4s ease-in-out;
        }

        .scoreboard {
            display: flex;
            gap: 3rem;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box { 
            background: var(--card-bg); 
            padding: 0.75rem 2rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .controls-hint { 
            margin-top: 1rem; 
            color: var(--text-secondary); 
            font-size: 0.95rem; 
            text-align: center;
        }

        /* Overlay setup */
        .game-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
            display: none; /* Hidden by default in CSS */
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
            z-index: 10;
            width: 85%;
            backdrop-filter: blur(5px);
        }
        
        .game-area {
            position: relative;
        }

        #toggle-controls-btn {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        #toggle-controls-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }

        .mobile-controls {
            display: flex;
            justify-content: center;
            gap: 3rem; 
            margin-top: 1.5rem;
            transition: opacity 0.3s ease;
        }

        .mobile-controls.hidden {
            display: none !important;
        }

        .dir-btn {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid var(--accent);
            color: white;
            font-size: 2rem;
            width: 80px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent; 
            transition: transform 0.1s, background 0.1s;
            user-select: none;
        }

        .dir-btn:active, .dir-btn.pressed {
            background: var(--accent);
            transform: scale(0.9);
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container" style="padding-top: 2rem; padding-bottom: 0;">
        <a href="arcade.html" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);">← Back to Arcade</a>
    </div>

    <div class="game-wrapper container">
        
        <div class="scoreboard">
            <div class="score-box">Score: <span id="score" class="accent-text">0</span></div>
            <div class="score-box">High Score: <span id="high-score" class="accent-text">0</span></div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="320" height="500" tabindex="0"></canvas>
            
            <div id="game-over" class="game-overlay">
                <h2 style="color: #ef4444; margin-bottom: 0.5rem;">CRASH!</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Watch out for traffic.</p>
                <button id="restart-btn" class="btn">Race Again</button>
            </div>

            <div id="start-screen" class="game-overlay" style="display: flex;">
                <h2 class="accent-text" style="margin-bottom: 0.5rem;">Retro Racing</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Dodge the cars, trucks, and bikes!</p>
                <button id="start-btn" class="btn">Start Engine</button>
            </div>
        </div>
        
        <button id="toggle-controls-btn">Show On-Screen Controls</button>

        <div id="mobile-controls" class="mobile-controls">
            <button class="dir-btn" id="btn-left">⬅️</button>
            <button class="dir-btn" id="btn-right">➡️</button>
        </div>

        <p class="controls-hint">
            <strong>Controls:</strong> Tap or Hold to snap between lanes.<br>
            <em>Speed increases the further you go!</em>
        </p>
    </div>

    <script src="nav.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("high-score");
        
        const gameOverScreen = document.getElementById("game-over");
        const startScreen = document.getElementById("start-screen");
        const restartBtn = document.getElementById("restart-btn");
        const startBtn = document.getElementById("start-btn");

        // UI Controls logic
        const toggleControlsBtn = document.getElementById("toggle-controls-btn");
        const mobileControls = document.getElementById("mobile-controls");

        if (window.innerWidth >= 768) {
            mobileControls.classList.add("hidden");
            toggleControlsBtn.innerText = "Show On-Screen Controls";
        } else {
            mobileControls.classList.remove("hidden");
            toggleControlsBtn.innerText = "Hide On-Screen Controls";
        }

        toggleControlsBtn.addEventListener("click", () => {
            mobileControls.classList.toggle("hidden");
            if (mobileControls.classList.contains("hidden")) {
                toggleControlsBtn.innerText = "Show On-Screen Controls";
            } else {
                toggleControlsBtn.innerText = "Hide On-Screen Controls";
            }
        });

        // Load High Score
        let highScore = localStorage.getItem("racingHighScore") || 0;
        highScoreEl.innerText = highScore;

        // --- NEW 4 LANE CONSTANTS ---
        const NUM_LANES = 4;
        const laneWidth = canvas.width / NUM_LANES;

        // Game State
        let frames = 0;
        let score = 0;
        let gameRunning = false;
        let animationId;
        let baseSpeed = 4; 
        let lineOffset = 0;

        // Input State
        const keys = { Left: false, Right: false };

        // Player (Racing Car)
        const player = {
            targetLane: 1, // Start in second lane from the left
            x: 0, 
            y: canvas.height - 80,
            width: 30, 
            height: 50,
            currentRotation: 0, 
            moveCooldown: 0, // Prevents instant teleporting when holding button
            
            draw: function() {
                ctx.save(); 
                ctx.translate(this.x, this.y);
                ctx.rotate(this.currentRotation);
                
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("🏎️", 0, 0); 
                
                ctx.restore(); 
            },
            
            update: function() {
                // Countdown the cooldown timer
                if (this.moveCooldown > 0) this.moveCooldown--;

                // If steering left, and we aren't at the far left edge, and cooldown is over
                if (keys.Left && this.targetLane > 0 && this.moveCooldown === 0) {
                    this.targetLane--;
                    this.moveCooldown = 15; // Wait 15 frames (~250ms) before changing lane again if held
                }
                
                // If steering right, and we aren't at the far right edge, and cooldown is over
                if (keys.Right && this.targetLane < NUM_LANES - 1 && this.moveCooldown === 0) {
                    this.targetLane++;
                    this.moveCooldown = 15; 
                }

                // Smoothly snap X position toward the center of the target lane
                let targetX = (this.targetLane * laneWidth) + (laneWidth / 2);
                let diff = targetX - this.x;
                
                // 0.3 makes the snap fast but smooth
                this.x += diff * 0.3;

                // Bank the car based on how fast it's moving horizontally
                this.currentRotation = diff * 0.015; 
            }
        };

        // Traffic (Enemies)
        const traffic = {
            array: [],
            vehicles: ["🚗", "🚚", "🏍️", "🚕"], 
            draw: function() {
                ctx.font = "40px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                for (let i = 0; i < this.array.length; i++) {
                    let v = this.array[i];
                    ctx.fillText(v.type, v.x, v.y);
                }
            },
            update: function() {
                let spawnRate = Math.max(30, 90 - (score * 2));

                if (frames % spawnRate === 0) {
                    // Spawn traffic in one of the 4 lanes
                    let laneIndex = Math.floor(Math.random() * NUM_LANES);
                    let xPos = (laneIndex * laneWidth) + (laneWidth / 2);
                    let vSpeed = baseSpeed + (Math.random() * 2 - 1);

                    this.array.push({
                        x: xPos,
                        y: -50,
                        type: this.vehicles[Math.floor(Math.random() * this.vehicles.length)],
                        speed: vSpeed,
                        passed: false
                    });
                }

                for (let i = 0; i < this.array.length; i++) {
                    let v = this.array[i];
                    v.y += v.speed; 

                    let pLeft = player.x - 10;
                    let pRight = player.x + 10;
                    let pTop = player.y - 15;
                    let pBottom = player.y + 15;

                    let vLeft = v.x - 10;
                    let vRight = v.x + 10;
                    let vTop = v.y - 15;
                    let vBottom = v.y + 15;

                    if (pLeft < vRight && pRight > vLeft && pTop < vBottom && pBottom > vTop) {
                        triggerGameOver();
                    }

                    if (v.y > player.y + 30 && !v.passed) {
                        score++;
                        scoreEl.innerText = score;
                        v.passed = true;
                        
                        if (score % 5 === 0) {
                            baseSpeed += 0.5;
                        }
                    }

                    if (v.y > canvas.height + 50) {
                        this.array.shift();
                        i--;
                    }
                }
            },
            reset: function() {
                this.array = [];
            }
        };

        function drawRoad() {
            ctx.fillStyle = "#334155";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 6;
            ctx.setLineDash([30, 30]); 
            
            lineOffset -= baseSpeed;
            if (lineOffset <= -60) lineOffset = 0;
            ctx.lineDashOffset = lineOffset;

            // Dynamically draw 3 divider lines for 4 lanes
            for (let i = 1; i < NUM_LANES; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }
            
            ctx.setLineDash([]);
        }

        function loop() {
            if (!gameRunning) return;

            drawRoad();
            player.update();
            player.draw();
            traffic.update();
            traffic.draw();

            frames++;
            animationId = requestAnimationFrame(loop);
        }

        function initGame() {
            // Set initial player position
            player.targetLane = 1; 
            player.x = (player.targetLane * laneWidth) + (laneWidth / 2);
            player.currentRotation = 0;
            player.moveCooldown = 0;
            
            traffic.reset();
            score = 0;
            frames = 0;
            baseSpeed = 4;
            scoreEl.innerText = score;
            
            gameOverScreen.style.display = "none";
            startScreen.style.display = "none";
            canvas.classList.remove('canvas-shake');
            
            // Focus canvas
            window.focus();
            canvas.focus();
            
            gameRunning = true;
            loop();
        }

        function triggerGameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            canvas.classList.add('canvas-shake');
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("racingHighScore", highScore);
                highScoreEl.innerText = highScore;
            }
            
            setTimeout(() => {
                gameOverScreen.style.display = "flex";
            }, 400); 
        }

        // --- BULLETPROOF CONTROLS LOGIC ---

        // Keyboard Event Listeners
        window.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") { 
                keys.Left = true; 
                if(e.key === "ArrowLeft") e.preventDefault(); 
            }
            if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") { 
                keys.Right = true; 
                if(e.key === "ArrowRight") e.preventDefault(); 
            }
        });

        window.addEventListener("keyup", (e) => {
            if (e.key === "ArrowLeft" || e.key.toLowerCase() === "a") {
                keys.Left = false;
                player.moveCooldown = 0; // Reset cooldown instantly on key release
            }
            if (e.key === "ArrowRight" || e.key.toLowerCase() === "d") {
                keys.Right = false;
                player.moveCooldown = 0;
            }
        });

        // Mobile On-Screen Buttons
        const btnLeft = document.getElementById("btn-left");
        const btnRight = document.getElementById("btn-right");

        // Touch Events
        btnLeft.addEventListener("touchstart", (e) => { e.preventDefault(); keys.Left = true; btnLeft.classList.add('pressed'); });
        btnLeft.addEventListener("touchend", (e) => { e.preventDefault(); keys.Left = false; player.moveCooldown = 0; btnLeft.classList.remove('pressed'); });
        btnLeft.addEventListener("touchcancel", (e) => { e.preventDefault(); keys.Left = false; player.moveCooldown = 0; btnLeft.classList.remove('pressed'); });

        btnRight.addEventListener("touchstart", (e) => { e.preventDefault(); keys.Right = true; btnRight.classList.add('pressed'); });
        btnRight.addEventListener("touchend", (e) => { e.preventDefault(); keys.Right = false; player.moveCooldown = 0; btnRight.classList.remove('pressed'); });
        btnRight.addEventListener("touchcancel", (e) => { e.preventDefault(); keys.Right = false; player.moveCooldown = 0; btnRight.classList.remove('pressed'); });

        // Mouse Events
        btnLeft.addEventListener("mousedown", (e) => { e.preventDefault(); keys.Left = true; });
        btnLeft.addEventListener("mouseup", (e) => { e.preventDefault(); keys.Left = false; player.moveCooldown = 0; });
        btnLeft.addEventListener("mouseleave", (e) => { e.preventDefault(); keys.Left = false; player.moveCooldown = 0; });

        btnRight.addEventListener("mousedown", (e) => { e.preventDefault(); keys.Right = true; });
        btnRight.addEventListener("mouseup", (e) => { e.preventDefault(); keys.Right = false; player.moveCooldown = 0; });
        btnRight.addEventListener("mouseleave", (e) => { e.preventDefault(); keys.Right = false; player.moveCooldown = 0; });

        startBtn.addEventListener("click", initGame);
        restartBtn.addEventListener("click", initGame);

        // Initial Draw to show background behind Start Screen
        drawRoad();
        
        // Setup initial car position for the background
        player.x = (1 * laneWidth) + (laneWidth / 2);
        player.draw();

    </script>
</body>
</html>
