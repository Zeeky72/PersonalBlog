<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake | Arcade</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
            user-select: none; /* Prevents text selection while tapping fast */
        }
        
        canvas {
            background-color: #0f172a; 
            border: 2px solid #334155;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 100%;
        }

        .scoreboard {
            display: flex;
            gap: 3rem;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box { 
            background: var(--card-bg); 
            padding: 0.75rem 2rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .controls-hint { 
            margin-top: 1rem; 
            color: var(--text-secondary); 
            font-size: 0.95rem; 
            text-align: center;
        }

        /* Overlay for Game Over */
        .game-over-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--accent);
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            width: 80%;
        }
        
        .game-area {
            position: relative;
        }

        /* Mobile D-Pad Controls */
        .mobile-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            transition: opacity 0.3s ease;
        }

        /* Hide class used by the JS toggle */
        .mobile-controls.hidden {
            display: none !important;
        }

        .horizontal-btns {
            display: flex;
            gap: 4rem; /* Creates space for the up/down buttons */
        }

        .dir-btn {
            background: rgba(30, 41, 59, 0.9);
            border: 2px solid var(--accent);
            color: white;
            font-size: 1.8rem;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent; /* Removes blue tap highlight on mobile */
            transition: transform 0.1s, background 0.1s;
        }

        .dir-btn:active {
            background: var(--accent);
            transform: scale(0.9);
        }

        /* Toggle Button Styling */
        #toggle-controls-btn {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-secondary);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        #toggle-controls-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container" style="padding-top: 2rem; padding-bottom: 0;">
        <a href="arcade.html" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);">← Back to Arcade</a>
    </div>

    <div class="game-wrapper container">
        
        <div class="scoreboard">
            <div class="score-box">Apples: <span id="score" class="accent-text">0</span></div>
            <div class="score-box">High Score: <span id="high-score" class="accent-text">0</span></div>
        </div>
        
        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div id="game-over" class="game-over-overlay">
                <h2 style="color: #ef4444; margin-bottom: 0.5rem;">Game Over!</h2>
                <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">You bit your own tail.</p>
                <button id="restart-btn" class="btn">Play Again</button>
            </div>
        </div>

        <button id="toggle-controls-btn">Show On-Screen Controls</button>

        <div id="mobile-controls" class="mobile-controls">
            <button class="dir-btn" id="btn-up">⬆️</button>
            <div class="horizontal-btns">
                <button class="dir-btn" id="btn-left">⬅️</button>
                <button class="dir-btn" id="btn-right">➡️</button>
            </div>
            <button class="dir-btn" id="btn-down">⬇️</button>
        </div>
        
        <p class="controls-hint">
            <strong>Controls:</strong> Arrow Keys or On-Screen buttons to move.<br>
            <em>Pro tip: You can pass through walls! Don't bite yourself.</em>
        </p>
    </div>

    <script src="nav.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");
        const highScoreEl = document.getElementById("high-score");
        const gameOverScreen = document.getElementById("game-over");
        const restartBtn = document.getElementById("restart-btn");
        
        // UI Controls logic
        const toggleControlsBtn = document.getElementById("toggle-controls-btn");
        const mobileControls = document.getElementById("mobile-controls");

        // Set initial visibility based on screen width
        if (window.innerWidth >= 768) {
            mobileControls.classList.add("hidden");
            toggleControlsBtn.innerText = "Show On-Screen Controls";
        } else {
            mobileControls.classList.remove("hidden");
            toggleControlsBtn.innerText = "Hide On-Screen Controls";
        }

        // Handle Toggle Click
        toggleControlsBtn.addEventListener("click", () => {
            mobileControls.classList.toggle("hidden");
            if (mobileControls.classList.contains("hidden")) {
                toggleControlsBtn.innerText = "Show On-Screen Controls";
            } else {
                toggleControlsBtn.innerText = "Hide On-Screen Controls";
            }
        });

        // --- GAME LOGIC ---

        const gridSize = 20;
        let snake, food, dx, dy, score, baseSpeed, gameLoopTimeout;
        let changingDirection = false;
        
        // Load High Score from Local Storage
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        highScoreEl.innerText = highScore;

        function initGame() {
            snake = [
                { x: 200, y: 200 },
                { x: 180, y: 200 },
                { x: 160, y: 200 }
            ];
            
            score = 0;
            dx = gridSize; 
            dy = 0;
            baseSpeed = 160; 
            
            scoreEl.innerText = score;
            gameOverScreen.style.display = "none";
            
            spawnFood();
            if(gameLoopTimeout) clearTimeout(gameLoopTimeout);
            main();
        }

        function main() {
            if (hasGameEnded()) {
                gameOverScreen.style.display = "flex";
                return;
            }

            changingDirection = false;

            let currentSpeed = Math.max(60, baseSpeed - (score * 3));
            
            gameLoopTimeout = setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, currentSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#0f172a"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                const hue = (190 + (index * 8)) % 360; 
                if (index === 0) {
                    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
                } else {
                    ctx.fillStyle = `hsl(${hue}, 100%, 50%)`;
                }
                ctx.fillRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall wrapping
            if (head.x < 0) head.x = canvas.width - gridSize;
            else if (head.x >= canvas.width) head.x = 0;
            
            if (head.y < 0) head.y = canvas.height - gridSize;
            else if (head.y >= canvas.height) head.y = 0;

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 1;
                scoreEl.innerText = score;
                
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    highScoreEl.innerText = highScore;
                }
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.font = `${gridSize - 2}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🍎", food.x + (gridSize / 2), food.y + (gridSize / 2));
        }

        function spawnFood() {
            let isOccupied = true;
            while(isOccupied) {
                food = {
                    x: Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize,
                    y: Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize
                };
                
                isOccupied = false;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        isOccupied = true;
                        break;
                    }
                }
            }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        // --- CORE DIRECTION LOGIC ---
        function setDirection(dir) {
            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if (dir === 'LEFT' && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
            if (dir === 'UP' && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
            if (dir === 'RIGHT' && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
            if (dir === 'DOWN' && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
        }

        // Keyboard Event Listener
        document.addEventListener("keydown", (event) => {
            const LEFT_KEY = 37, RIGHT_KEY = 39, UP_KEY = 38, DOWN_KEY = 40;
            const keyPressed = event.keyCode;
            
            if([37, 38, 39, 40].includes(keyPressed)) {
                event.preventDefault();
            }

            if (keyPressed === LEFT_KEY) setDirection('LEFT');
            if (keyPressed === UP_KEY) setDirection('UP');
            if (keyPressed === RIGHT_KEY) setDirection('RIGHT');
            if (keyPressed === DOWN_KEY) setDirection('DOWN');
        });

        // Mobile Button Event Listeners
        const btnMap = {
            'btn-up': 'UP',
            'btn-down': 'DOWN',
            'btn-left': 'LEFT',
            'btn-right': 'RIGHT'
        };

        for (const [id, dir] of Object.entries(btnMap)) {
            const btn = document.getElementById(id);
            // Touch trigger
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                setDirection(dir); 
            });
            // Mouse trigger (for testing on desktop)
            btn.addEventListener('mousedown', (e) => { 
                e.preventDefault(); 
                setDirection(dir); 
            });
        }

        restartBtn.addEventListener("click", initGame);

        // Start game on load
        initGame();
    </script>
</body>
</html>
