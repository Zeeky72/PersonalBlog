<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Simi 🌸</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Romantic Animated Background */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Keeps floating emojis inside */
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Inter', sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Cute Glassmorphism Card */
        .auth-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 3rem 2rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-link {
            position: absolute;
            top: 1rem;
            left: 1.5rem;
            color: #d81b60;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .back-link:hover { transform: scale(1.1); }

        h2 { color: #d81b60; font-size: 2rem; margin-bottom: 0.5rem; }
        
        /* Input Styling */
        .passcode-input {
            width: 80%;
            padding: 1rem;
            margin: 1.5rem 0;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid #ffb6c1;
            border-radius: 12px;
            color: #d81b60;
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .passcode-input:focus { 
            border-color: #ff69b4;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
        }

        /* Custom Button */
        .cute-btn {
            background: linear-gradient(45deg, #ff69b4, #ff8c00);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            width: 80%;
        }

        .cute-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.6);
        }

        /* Hints and Counters */
        .stats-area { margin-top: 1.5rem; font-size: 0.9rem; color: #c2185b; }
        .hint-text { font-style: italic; font-weight: bold; margin-top: 0.5rem; min-height: 20px; transition: opacity 0.3s;}

        /* Floating Elements Animations */
        .floating-item {
            position: absolute;
            pointer-events: none;
            z-index: 1; 
        }

        .floating-msg {
            background: white;
            color: #ff1493;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: floatMessage 3s ease-out forwards;
            z-index: 20; 
        }

        .floating-emoji {
            animation: floatEmoji 5s linear forwards;
        }

        @keyframes floatEmoji {
            0% { transform: translateY(0) translateX(0) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(-50vh) translateX(30px) scale(1.2) rotate(180deg); }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) translateX(-30px) scale(1.5) rotate(360deg); opacity: 0; }
        }

        @keyframes floatMessage {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(-20px) scale(1.1); }
            100% { transform: translateY(-200px) scale(1); opacity: 0; }
        }

        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }
        .shake { animation: gentleShake 0.4s ease-in-out; }

        /* Full Screen Success View with Story Progression */
        .success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 30;
            width: 100%;
        }

        .story-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 2rem;
            max-width: 800px;
            padding: 0 20px;
            /* Beautiful vibrant text gradient */
            background: linear-gradient(to right, #ff1493, #ff4500, #ff1493);
            background-size: 200% auto;
            color: #fff;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            /* Soft glow behind text */
            filter: drop-shadow(0px 2px 10px rgba(255, 105, 180, 0.4));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Animation for when a new message appears */
        .slide-up-fade {
            animation: slideUpFade 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

    </style>
</head>
<body>

    <div class="auth-container" id="auth-box">
        <div id="auth-view">
            <a href="arcade.html" class="back-link">← Go Back</a>
            <h2>Hey cutie ✨</h2>
            <p style="color: #d81b60; font-weight: 500;">Enter our special passcode</p>
            
            <input type="password" id="passcode-input" class="passcode-input" placeholder="••••••" maxlength="6" autofocus>
            
            <button id="submit-btn" class="cute-btn">Unlock ❤️</button>

            <div class="stats-area">
                <div id="counter-text">Attempts: 0</div>
                <div id="hint-text" class="hint-text"></div>
            </div>
        </div>

        <div id="success-view" class="success-screen">
            <div id="story-container" class="story-text slide-up-fade">
                You cracked the code! 💖
            </div>
            
            <button id="next-msg-btn" class="cute-btn" style="width: auto; min-width: 150px; font-size: 1.2rem;">Next ✨</button>
            <a href="arcade.html" id="final-btn" class="cute-btn" style="width: auto; display: none; text-decoration: none;">Keep exploring my portfolio 🥺</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const submitBtn = document.getElementById('submit-btn');
            const inputField = document.getElementById('passcode-input');
            const authView = document.getElementById('auth-view');
            const successView = document.getElementById('success-view');
            const authBox = document.getElementById('auth-box');
            const counterText = document.getElementById('counter-text');
            const hintText = document.getElementById('hint-text');

            // Success Story Progression Elements
            const storyContainer = document.getElementById('story-container');
            const nextMsgBtn = document.getElementById('next-msg-btn');
            const finalBtn = document.getElementById('final-btn');

            let attempts = 0;
            const correctCode = "simi72";

            // Cute error messages and emojis
            const wrongMessages = ["Oops! Try again sweetie 🥺", "Not quite right! 💔", "Are you guessing? 🤨", "Hmm... nope! 🌸", "Close, but no cigar! ✨"];
            const wrongEmojis = ["❌", "🥺", "💔", "🥀", "😅", "☁️", "💧"];
            const rightEmojis = ["❤️", "💖", "✨", "🌸", "🥰", "🎉", "🦋"];

            // Updated Hints for "simi72"
            const hints = [
                "Hint: It's a mix of letters and numbers...",
                "Hint: It starts with your beautiful name...",
                "Hint: Make sure it's all lowercase...",
                "Hint: It ends with the numbers 7 and 2...",
                "Okay, just type simi72 silly! 🤦‍♂️"
            ];

            // The romantic story messages array
            const loveStory = [
                "You cracked the code! 💖",
                "I just wanted to take a little moment to say...",
                "You are the most amazing person in my life. ✨",
                "Every single day with you feels like winning the ultimate prize.",
                "You are my greatest motivation and my favorite secret. 🌸",
                "I love you, Simi. Forever and always. ❤️"
            ];
            let currentStoryIndex = 0;

            inputField.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') checkPasscode();
            });

            submitBtn.addEventListener('click', checkPasscode);

            function checkPasscode() {
                // .trim() removes spaces, .toLowerCase() makes it case insensitive!
                const code = inputField.value.trim().toLowerCase(); 
                
                if (code === correctCode) {
                    triggerSuccess();
                } else {
                    triggerError();
                }
            }

            function triggerError() {
                attempts++;
                counterText.innerText = `Attempts: ${attempts}`;
                
                // Show hint based on attempt count
                let hintIndex = Math.min(attempts - 1, hints.length - 1);
                hintText.innerText = hints[hintIndex];

                // Add shake animation
                authBox.classList.add('shake');
                setTimeout(() => authBox.classList.remove('shake'), 400);

                inputField.value = '';

                // Spawn ONE readable floating message near the top of the box
                spawnFloatingMessage(wrongMessages[Math.floor(Math.random() * wrongMessages.length)]);
                
                // Spawn MULTIPLE emojis across the entire screen
                for(let i=0; i<6; i++) {
                    setTimeout(() => spawnFloatingEmoji(wrongEmojis[Math.floor(Math.random() * wrongEmojis.length)]), i * 150);
                }
            }

            function triggerSuccess() {
                // Change UI state
                authView.style.display = 'none';
                successView.style.display = 'flex';
                
                // Make the box expand and become totally transparent
                authBox.style.maxWidth = "900px";
                authBox.style.background = "transparent";
                authBox.style.border = "none";
                authBox.style.boxShadow = "none";
                authBox.style.backdropFilter = "none";

                // Set initial story message
                storyContainer.innerHTML = loveStory[currentStoryIndex];

                // Generate hearts across the whole screen continuously
                setInterval(() => spawnFloatingEmoji(rightEmojis[Math.floor(Math.random() * rightEmojis.length)]), 100);
            }

            // Next Button Logic
            nextMsgBtn.addEventListener('click', () => {
                currentStoryIndex++;
                
                // Re-trigger the CSS animation so it slides up and fades in again
                storyContainer.classList.remove('slide-up-fade');
                void storyContainer.offsetWidth; // Trigger reflow to restart animation
                storyContainer.classList.add('slide-up-fade');

                if (currentStoryIndex < loveStory.length) {
                    storyContainer.innerHTML = loveStory[currentStoryIndex];
                } 
                
                // If it's the last message, swap the buttons
                if (currentStoryIndex === loveStory.length - 1) {
                    nextMsgBtn.style.display = 'none';
                    finalBtn.style.display = 'inline-block';
                }
            });

            function spawnFloatingMessage(text) {
                const el = document.createElement('div');
                el.classList.add('floating-item', 'floating-msg');
                el.innerText = text;
                
                const startX = (window.innerWidth / 2) - 100; 
                const startY = (window.innerHeight / 2) - 150; 
                
                el.style.left = `${startX}px`;
                el.style.top = `${startY}px`;

                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }

            function spawnFloatingEmoji(emoji) {
                const el = document.createElement('div');
                el.classList.add('floating-item', 'floating-emoji');
                el.innerText = emoji;
                
                const startX = Math.random() * window.innerWidth;
                const startY = window.innerHeight + 50; 
                
                el.style.left = `${startX}px`;
                el.style.top = `${startY}px`;
                el.style.fontSize = `${Math.random() * 2 + 1.5}rem`;
                el.style.animationDuration = `${Math.random() * 3 + 4}s`;

                document.body.appendChild(el);
                setTimeout(() => el.remove(), 6000); 
            }
        });
    </script>
</body>
</html>
