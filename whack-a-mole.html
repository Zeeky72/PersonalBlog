<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole | Arcade</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
            position: relative;
        }

        .scoreboard {
            display: flex;
            gap: 3rem;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box { 
            background: var(--card-bg); 
            padding: 0.75rem 2rem; 
            border-radius: 8px; 
            border: 1px solid #334155; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 150px;
        }

        /* The Grid System */
        .mole-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            border: 2px solid #334155;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }

        /* The Hole */
        .hole {
            background: #000; /* Deep black for depth */
            border-radius: 50%;
            height: 100px;
            position: relative;
            overflow: hidden;
            border-bottom: 8px solid #0f172a; /* Creates 3D depth */
            box-shadow: inset 0 10px 15px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
        }

        /* The Mole */
        .mole {
            font-size: 4.5rem;
            position: absolute;
            bottom: -15px; /* Sits just inside the hole */
            transform: translateY(110%); /* Hidden by default */
            /* The secret to smoothness: a springy cubic-bezier transition */
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        /* Active State */
        .hole.up .mole {
            transform: translateY(0);
        }

        /* Whacked Feedback */
        .hole.up .mole.whacked {
            transform: translateY(20%) scale(0.8);
            filter: brightness(0.5);
            transition: transform 0.1s ease-out; /* Fast shrink on hit */
        }

        /* Start/Game Over Overlay */
        .game-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--accent);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            z-index: 10;
            width: 90%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <div class="container" style="padding-top: 2rem; padding-bottom: 0;">
        <a href="arcade.html" class="btn" style="background: transparent; border: 1px solid var(--accent); color: var(--accent);">← Back to Arcade</a>
    </div>

    <div class="game-wrapper container">
        
        <div class="scoreboard">
            <div class="score-box">Score: <br><span id="score" class="accent-text" style="font-size: 1.8rem;">0</span></div>
            <div class="score-box">Time: <br><span id="time" class="accent-text" style="font-size: 1.8rem;">30</span>s</div>
        </div>

        <div class="mole-grid" id="game-board">
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>
            <div class="hole"><div class="mole">🐹</div></div>

            <div id="start-screen" class="game-overlay">
                <h2 class="accent-text" style="margin-bottom: 0.5rem; font-size: 2rem;">Whack-a-Mole</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Test your reflexes. You have 30 seconds to whack as many as possible!</p>
                <button id="start-btn" class="btn" style="padding: 1rem 2rem; font-size: 1.1rem;">Start Game</button>
            </div>

            <div id="game-over" class="game-overlay" style="display: none;">
                <h2 style="margin-bottom: 0.5rem; font-size: 2.5rem; color: #fff;">Time's Up!</h2>
                <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Final Score</p>
                <h1 id="final-score" class="accent-text" style="font-size: 4rem; margin-bottom: 2rem;">0</h1>
                
                <p id="high-score-text" style="color: #22c55e; margin-bottom: 1.5rem; display: none; font-weight: bold;">🏆 New High Score!</p>
                
                <button id="restart-btn" class="btn">Play Again</button>
            </div>
        </div>
        
    </div>

    <script src="nav.js"></script>

    <script>
        const holes = document.querySelectorAll('.hole');
        const moles = document.querySelectorAll('.mole');
        const scoreBoard = document.getElementById('score');
        const timeBoard = document.getElementById('time');
        
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const finalScoreEl = document.getElementById('final-score');
        const highScoreText = document.getElementById('high-score-text');

        let lastHole;
        let timeUp = false;
        let score = 0;
        let gameTime = 30; // 30 seconds
        let countdownTimer;
        let moleTimer;

        // Load High Score
        let highScore = localStorage.getItem("moleHighScore") || 0;

        // Math utility to randomize mole pop-up times
        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        // Math utility to pick a random hole, ensuring it doesn't pick the same one twice in a row
        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function peep() {
            // Speed up the game as time ticks down!
            const minTime = Math.max(300, 700 - (score * 10)); 
            const maxTime = Math.max(600, 1200 - (score * 15));
            
            const time = randomTime(minTime, maxTime);
            const hole = randomHole(holes);
            
            // Reset the mole's visual state
            const mole = hole.querySelector('.mole');
            mole.innerText = "🐹";
            mole.classList.remove('whacked');
            
            hole.classList.add('up'); // Trigger CSS Animation

            moleTimer = setTimeout(() => {
                hole.classList.remove('up');
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            // Reset state
            scoreBoard.textContent = 0;
            timeBoard.textContent = gameTime;
            timeUp = false;
            score = 0;
            
            // UI setup
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            highScoreText.style.display = 'none';

            // Start logic
            peep();
            
            // Handle Countdown
            let timeLeft = gameTime;
            countdownTimer = setInterval(() => {
                timeLeft--;
                timeBoard.textContent = timeLeft;
                
                // Change timer color to red when running out of time
                if(timeLeft <= 5) {
                    timeBoard.style.color = "#ef4444";
                } else {
                    timeBoard.style.color = "var(--accent)";
                }

                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            timeUp = true;
            clearTimeout(moleTimer);
            
            // Hide any moles currently up
            holes.forEach(hole => hole.classList.remove('up'));
            
            // Show Game Over UI
            finalScoreEl.textContent = score;
            
            if (score > highScore && score > 0) {
                highScore = score;
                localStorage.setItem("moleHighScore", highScore);
                highScoreText.style.display = "block";
            }
            
            setTimeout(() => {
                gameOverScreen.style.display = 'flex';
            }, 500); // Slight delay so the last animation finishes
        }

        function whack(e) {
            // e.isTrusted prevents automated script clicking!
            if (!e.isTrusted) return; 
            
            // If the mole is already going down, don't count it
            if (!this.parentElement.classList.contains('up')) return; 

            score++;
            this.parentElement.classList.remove('up');
            
            // Apply visual feedback
            this.classList.add('whacked');
            this.innerText = "💥"; // Turn into a pow explosion!
            
            scoreBoard.textContent = score;
        }

        // Attach Event Listeners to all moles
        moles.forEach(mole => mole.addEventListener('mousedown', whack));
        
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
